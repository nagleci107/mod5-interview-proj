<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieDb</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <script src="https://kit.fontawesome.com/e865365090.js" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="nav__logo">
                <img src="" class="nav__logo--img" alt="">
                <h1></h1>
            </a>
            <ul class="nav__link--list">
                <li class="nav__link">
                    <a href="#" class="
                          nav__link--anchor 
                          link__hover-effect 
                          link__hover-effect--color
                          ">Home
                    </a>
                </li>
                <li class="nav__link">
                    <a href="#" class="
                          nav__link--anchor 
                          link__hover-effect 
                          link__hover-effect--color
                          ">Movies
                    </a>
                </li>
            </ul>
        </nav>

        <div class="container">
            <div class="row">
                <h2>
                    Browse Movies
                </h2>
                <div class="search--container">
                    <input type="number" placeholder="Search by Title" onchange="onSearchChange(event)">
                </div>
            </div>
        </div>
    </header>
    <section class="search--results">
        <div class="results__header">
            <h2>Search Results</h2>
            <select name="filter" onchange="filterBooks(event)">
                <option value="" disabled selected>Sort</option>
                <option value="ALPH_TO_Z">
                    Alphabetical A to Z</option>
                <option value="ALPH_TO_A">
                    Alphabetical Z to A</option>
                <option value="NEWEST">
                    Newest to Oldest</option>
                <option value="OLDEST">
                    Oldest to Newest</option>
            </select>
        </div>
        <div class="results">
            <i class="fas fa-spinner books__loading--spinner"></i>
        </div>
        
    </section>
    <footer>
        <div class="container">
      <div class="row row__column">
        <a href="#">
          <figure class="footer__logo">
            <img src="" class="footer__logo--img" alt="">
          </figure>
        </a>
        <div class="footer__list">
          <a href="#" class="footer__link">Home</a>
          <a href="#" class="footer__link">Movies</a>
        </div>
      </div>
    </div>
    </footer>
</body>
</html>
