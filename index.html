<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieDb</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"
        integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <script src="https://kit.fontawesome.com/e865365090.js" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="#" class="nav__logo">
                <img src="" class="nav__logo--img" alt="">
                <h1></h1>
            </a>
            <ul class="nav__link--list">
                <li class="nav__link">
                    <a href="#" class="
                          nav__link--anchor 
                          link__hover-effect 
                          link__hover-effect--color
                          ">Home
                    </a>
                </li>
                <li class="nav__link">
                    <a href="#" class="
                          nav__link--anchor 
                          link__hover-effect 
                          link__hover-effect--color
                          ">Movies
                    </a>
                </li>
            </ul>
        </nav>

        <div class="container">
            <div class="row">
                <h2>
                    Browse Movies
                </h2>
                <div class="search--container">
                    <input type="number" placeholder="Search by Title" onchange="onSearchChange(event)">
                </div>
            </div>
        </div>
    </header>
    <footer>

    </footer>
</body>
</html>
